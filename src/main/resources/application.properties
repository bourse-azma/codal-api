spring.application.name=codal-api
# Server
server.port=9002
server.servlet.context-path=/codal
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Cache
cache.enabled=true
cache.default-ttl-ms=3600000
cache.key-prefix=codal-api:
# Cache names
cache.names.notices=codal-notices
cache.names.companies=codal-companies
cache.names.industry-groups=codal-industry-groups
cache.names.categories=codal-categories
cache.names.financial-years=codal-financial-years
cache.names.auditors=codal-auditors
cache.names.financial-statements=codal-financial-statements
# Cache TTLs (ms)
cache.ttls.notices-ms=${VITE_CODAL_NOTICES_REFRESH_MS:30000}
cache.ttls.companies-ms=3600000
cache.ttls.industry-groups-ms=3600000
cache.ttls.categories-ms=3600000
cache.ttls.financial-years-ms=3600000
cache.ttls.auditors-ms=3600000
cache.ttls.financial-statements-ms=86400000
# External APIs
external.codal.base-url=https://search.codal.ir/api
external.codal.web-base-url=https://www.codal.ir
# API Documentation
springdoc.swagger-ui.path=/doc.html
# Logging
logging.level.com.ernoxin=DEBUG
# =========================
# Virtual Threads (Java 21 / Project Loom)
# =========================
spring.threads.virtual.enabled=true
# =========================
# Tomcat Tuning
# =========================
server.tomcat.max-connections=8192
server.tomcat.accept-count=100
server.tomcat.connection-timeout=5s
# =========================
# Redis Connection Pool (requires commons-pool2)
# =========================
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2s
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=3s
